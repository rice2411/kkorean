<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>KKorean | Offline</title>
  <!-- Tailwind CSS CDN -->
  <link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet">
</head>

<body>
  <main class="bg-gray-50 dark:bg-gray-900">
    <div class="flex flex-col justify-center items-center px-6 mx-auto h-screen xl:px-0">
      <div class="block md:max-w-lg">
        <img src="https://flowbite-admin-dashboard.vercel.app/images/illustrations/500.svg"
          alt="Illustration of an astronaut" class="mx-auto">
      </div>
      <div class="text-center xl:max-w-4xl">
        <h1 class="mb-3 text-2xl font-bold leading-tight text-gray-900 sm:text-4xl lg:text-5xl dark:text-white">
          Something has gone seriously wrong
        </h1>
        <p class="mb-5 text-base font-normal text-gray-500 md:text-lg dark:text-gray-400">
          It's always time for a coffee break. We should be back by the time you finish your coffee.
        </p>
        <a href="https://flowbite-admin-dashboard.vercel.app/"
          class="text-white bg-blue-600 hover:bg-blue-700 focus:ring-4 focus:ring-blue-300 font-medium rounded-lg text-sm px-5 py-2.5 text-center inline-flex items-center mr-3 dark:bg-blue-500 dark:hover:bg-blue-600 dark:focus:ring-blue-700">
          <svg class="mr-2 -ml-1 w-5 h-5" fill="currentColor" viewBox="0 0 20 20" xmlns="http://www.w3.org/2000/svg">
            <path fill-rule="evenodd"
              d="M12.707 5.293a1 1 0 010 1.414L9.414 10l3.293 3.293a1 1 0 01-1.414 1.414l-4-4a1 1 0 010-1.414l4-4a1 1 0 011.414 0z"
              clip-rule="evenodd"></path>
          </svg>
          Go back home
        </a>
      </div>
    </div>
  </main>
</body>

</html>
